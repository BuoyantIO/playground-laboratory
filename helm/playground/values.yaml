namespace:
  name: playground
  annotations:
    linkerd.io/inject: enabled

# --- Server ------------------------------------------------------------
http:
  image:
    repository: ghcr.io/buoyantio/playground-laboratory/playground-server
    tag: 1.0.5
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080

  primary:
    replicas: 1
    serviceAccount:
      name: playground-server-http-primary
    env:
      APP_VERSION: "v1"
      RESPONSE_TEXT: "hello from primary"
      LATENCY_MS: "0"
      LATENCY_JITTER_MS: "0"
      ERROR_RATE: "0"
      ERROR_CODE: "500"
      FAIL_ON_STARTUP: "false"
      CRASH_AFTER_REQUESTS: "0"
      READINESS_FAIL_RATE: "0"
    resources: {}
    podAnnotations: {}

  canary:
    replicas: 1
    serviceAccount:
      name: playground-server-http-canary
    env:
      APP_VERSION: "v2"
      RESPONSE_TEXT: "hello from canary"
      LATENCY_MS: "0"
      LATENCY_JITTER_MS: "0"
      ERROR_RATE: "0"
      ERROR_CODE: "500"
      FAIL_ON_STARTUP: "false"
      CRASH_AFTER_REQUESTS: "0"
      READINESS_FAIL_RATE: "0"
    resources: {}
    podAnnotations: {}

# --- Client -------------------------------------------------------------
client:
  replicas: 1
  image:
    repository: ghcr.io/buoyantio/playground-laboratory/playground-client
    tag: 1.0.5
    pullPolicy: Always
  serviceAccount:
    name: playground-client
  service:
    type: ClusterIP
    port: 3000
  env:
    FETCH_TIMEOUT_MS: "0"
    # Polling cadence (ms) read by the Next.js client at runtime via /api/config.
    # Can be overridden in the UI with the Pause/Resume button.
    POLL_INTERVAL_MS: "1000"
    # Set to "false" to start the client with polling disabled. The UI can still
    # resume it on demand.
    POLL_ENABLED: "true"
  resources: {}
  podAnnotations: {}

# --- Observability subcharts -------------------------------------------
prometheus:
  enabled: false
  forceNamespace: monitoring
  alertmanager:
    namespaceOverride: monitoring
  kube-state-metrics:
    namespaceOverride: monitoring
  prometheus-node-exporter:
    namespaceOverride: monitoring
  prometheus-pushgateway:
    namespaceOverride: monitoring

grafana:
  enabled: false
  namespaceOverride: monitoring
