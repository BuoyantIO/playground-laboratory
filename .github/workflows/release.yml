name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            image: playground-client
            context: client
            build-args: ''
          - name: server (http)
            image: playground-server
            context: server
            build-args: |
              CMD=http
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.VERSION }}
            type=semver,pattern={{major}},value=${{ env.VERSION }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          helm dependency update helm/playground
          # Workaround: recent Helm versions only recognize subchart
          # dependencies as extracted directories, not as <name>-<ver>.tgz.
          (cd helm/playground/charts && for f in *.tgz; do tar xzf "$f"; done)
          mkdir -p dist
          helm package helm/playground \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist

      - name: Push chart
        run: helm push "dist/playground-${VERSION}.tgz" "oci://ghcr.io/${REPO_LC}/charts"
