name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      client-artifact:
        description: Name of the uploaded client artifact
        value: ${{ jobs.build-client.outputs.artifact-name }}
      server-artifact:
        description: Name of the uploaded server artifact
        value: ${{ jobs.build-server.outputs.artifact-name }}

jobs:
  build-client:
    name: Build client
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.name }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - id: meta
        run: echo "name=client-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: client/.next/standalone
          if-no-files-found: error
          retention-days: 14

  build-server:
    name: Build server
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.name }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o dist/playground-server ./cmd/http

      - id: meta
        run: echo "name=server-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: server/dist/playground-server
          if-no-files-found: error
          retention-days: 14

  validate-helm:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Update chart dependencies
        run: helm dependency update helm/playground

      - name: Lint
        run: helm lint helm/playground

      - name: Render (default values)
        run: helm template playground helm/playground > /dev/null

      - name: Render (with subcharts enabled)
        run: |
          helm template playground helm/playground \
            --set prometheus.enabled=true \
            --set grafana.enabled=true > /dev/null
